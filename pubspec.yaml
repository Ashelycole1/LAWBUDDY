name: law_buddy
description: A high-performance, local-first AI legal assistant for the Ugandan Constitution.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # AI Integration
  google_generative_ai: ^0.4.4

  # Utility
  shared_preferences: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/data/constitution_enriched.json
